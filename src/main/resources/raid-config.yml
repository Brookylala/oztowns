# OzTowns raid settings.
# This file controls raid mechanics and raid-item validation only.
# Raid chat text remains in messages.yml under messages.*.

raid:
  # Global raid toggle.
  enabled: true

  # Seconds a raider must survive after a valid breach.
  duration-seconds: 60

  # Conditions that immediately fail an active raid.
  fail-on-damage: true
  fail-on-death: true
  fail-on-disconnect: true

  # World filtering.
  # Leave allowed empty to permit all worlds except blocked.
  worlds:
    allowed: []
    blocked: []

  # Raid boss bar appearance.
  bossbar:
    color: RED
    style: SEGMENTED_10

  # Whether successful town-vs-town raids are broadcast server-wide.
  broadcast:
    enabled: true

  # Sound played at raid completion when the town core is broken.
  sounds:
    success:
      enabled: true
      sound: BLOCK_STONE_BREAK
      volume: 1.0
      pitch: 1.0

  # Optional OzTowns-owned raid pick definition.
  # Disabled by default so existing servers keep current behavior.
  item:
    enabled: false

    # Base item settings.
    material: TRIPWIRE_HOOK
    amount: 1
    display-name: "&cRaid Pick"
    lore:
      - "&7Use this to raid town cores."
    custom-model-data: 0
    unbreakable: false

    # Identification rules used to validate a raid pick.
    # Enable multiple checks for stricter matching.
    identification:
      require-pdc: false
      pdc:
        namespace: "oztowns"
        key: "raid_pick"
        value: "true"
      match-custom-model-data: false
      match-display-name: false
      match-lore: false
      match-material-fallback: true
      strict-meta: false

# Optional crafting recipe for the OzTowns raid lockpick item.
recipe:
  enabled: true
  shape:
    - " IN"
    - " SI"
    - "S  "
  ingredients:
    I: IRON_INGOT
    N: NETHERITE_SCRAP
    S: STICK
