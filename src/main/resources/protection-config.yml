# Toggle protection systems on/off.
protection:
  block-break: true
  block-place: true
  interact: true
  inventory-open: true
  entity-explode: true
  block-explode: true

  # Bypass options for specific protection checks.
  bypass:
    # If true, opening InventoryHolder blocks (chests, barrels, etc.) bypasses town container checks.
    inventory-holders: true
    # If true, virtual inventory opens tied to the active town Lodestone bypass container checks.
    town-lodestone-inventory: true
