# OzTowns - Main Town GUI
# This file controls /towns gui layout and click actions.

# Inventory title shown to players.
title: "&8OzTowns Menu"
# Inventory size (must be a multiple of 9).
size: 27

filler:
  # If true, automatically fills all empty slots with the filler item.
  fill: true
  # Filler item material (Bukkit Material enum).
  material: "GRAY_STAINED_GLASS_PANE"
  # Filler item display name.
  name: " "

items:
  # Item key name (help/spawn/etc.) is internal and can be renamed safely.
  # Each item must define slot, material, name, lore, and command.
  help:
    # Slot index (0-based). For size 27, valid slots are 0-26.
    slot: 10
    # Bukkit Material enum value.
    material: "PLAYER_HEAD"
    # Base64 skin texture used when material is PLAYER_HEAD.
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvMzcyNWRhODJhYTBhZGU1ZDUyYmQyMDI0ZjRiYzFkMDE5ZmMwMzBlOWVjNWUwZWMxNThjN2Y5YTZhYTBjNDNiYSJ9fX0="
    # Display name shown in GUI.
    name: "&e&lHelp"
    # Lore lines shown under the display name.
    lore:
      - "&7Click to view all"
      - "&7available commands."
    # Command executed when clicked (without leading slash).
    command: "town help"
  spawn:
    slot: 11
    material: "PLAYER_HEAD"
    texture: "eyJ0ZXh0dXJlcyI6eyJTS0lOIjp7InVybCI6Imh0dHA6Ly90ZXh0dXJlcy5taW5lY3JhZnQubmV0L3RleHR1cmUvZjUwMjE2NTk3ZjE2YmNkYzIyZjEwYTNjYzIyOTljYTg4NGM1N2U0Njg1MGZiOGRlZjAxODk1NjYyZDM5MDQwNCJ9fX0="
