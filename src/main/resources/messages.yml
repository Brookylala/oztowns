# message Prefix (Server name) leave a space after the prefix
prefix: '&f&l[&c&lOz&4&lTowns&f&l] '

# Main help pages (/towns help [1-2])
help:
  "1":
    - "&f/towns help [1-2] &7- &aView all town commands."
    - "&f/towns commands [1-2] &7- &aAlias for /towns help."
    - "&f/towns create [townName] &7- &aCreate a new town."
    - "&f/towns rename [newName] &7- &aRename your town."
    - "&f/towns abandon confirm &7- &aDelete your town."
    - "&f/towns add [player] &7- &aAlias for /towns invite."
    - "&f/towns invite [player] &7- &aInvite a player to your town."
    - "&f/towns accept &7- &aAccept your pending town invite."
    - "&f/towns deny &7- &aDeny your pending town invite."
    - "&f/towns remove [player] &7- &aRemove a player from your town."
    - "&f/towns promote [player] &7- &aPromote a member to Officer."
    - "&f/towns demote [player] &7- &aDemote an Officer to Member."
    - "&f/towns leave &7- &aLeave your current town."
  "2":
    - "&f/towns gui &7- &aOpen the main towns menu."
    - "&f/towns members &7- &aOpen the town members menu."
    - "&f/towns claim &7- &aClaim the chunk you are standing in."
    - "&f/towns unclaim &7- &aUnclaim the chunk you are standing in."
    - "&f/towns setspawn &7- &aSet your town spawn and places the town block."
    - "&f/towns spawn &7- &aTeleport to your town spawn."
    - "&f/towns setmayor [player] &7- &aTransfers town ownership."
    - "&f/towns visualizer &7- &aShow claimed and unclaimed chunk borders."
    - "&f/towns chunks &7- &aAlias for /towns visualizer."
    - "&f/townbank gui &7- &aOpen the town bank menu."
    - "&f/townbank help &7- &aView town bank commands."
    - "&f/townbank commands &7- &aAlias for /townbank help."
    - "&f/tm [message] &7- &aMessage in the town member only chat."

# The bank help menu to show commands
bankhelp:
  - "&f/townbank help &7- &aShow all town bank commands."
  - "&f/townbank commands &7- &aAlias for /townbank help."
  - "&f/townbank gui &7- &aOpen the town bank menu."
  - "&f/townbank deposit [amount] &7- &aDeposit money into the town bank."
  - "&f/townbank withdraw [amount] &7- &aWithdraw money from the town bank."
  - "&f/townbank balance &7- &aView your town bank balance."
  - "&f/townbank bal &7- &aAlias for /townbank balance."

